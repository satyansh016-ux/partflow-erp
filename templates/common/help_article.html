{% extends "base.html" %}
{% block title %}{{ article.title }} - Help Center{% endblock %}
{% block content %}
<div class="pf-topbar">
  <h1>{{ article.title }}</h1>
  <a href="{{ url_for('common.help_center') }}" class="btn btn-outline-secondary">Back to Help Center</a>
</div>

<div class="pf-card">
  {% if article.video_url %}
  <div class="ratio ratio-16x9 mb-3">
    <iframe src="{{ article.video_url }}" allowfullscreen></iframe>
  </div>
  {% endif %}
  <div>{{ article.body_html | safe }}</div>
</div>

<div class="pf-card text-center mt-3">
  <p class="text-muted small mb-2">Still stuck?</p>
  <a href="{{ url_for('common.support_tickets') }}" class="btn btn-outline-secondary">Contact Support</a>
</div>
{% endblock %}
