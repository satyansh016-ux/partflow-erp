{% extends "base.html" %}
{% block title %}New Sale - PartFlow ERP{% endblock %}
{% block content %}
<div class="pf-topbar"><h1>New Sale</h1></div>

<form method="POST" id="saleForm">
  <div class="row g-3">
    <div class="col-lg-8">
      <div class="pf-card mb-3">
        <h6 class="fw-bold mb-3" style="color:var(--pf-navy);">Customer & Vehicle</h6>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Customer Name *</label>
            <input type="text" name="customer_name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Mobile Number</label>
            <input type="text" name="mobile" class="form-control" placeholder="Used to find existing customer">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Vehicle Number</label>
            <input type="text" name="vehicle_number" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Vehicle Type</label>
            <select name="vehicle_type" class="form-select">
              {% for vt in ['bike','car','truck','bus','tractor','jcb','heavy_vehicle'] %}
                <option value="{{ vt }}">{{ vt.replace('_',' ').title() }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="pf-card mb-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0" style="color:var(--pf-navy);">Parts</h6>
          <button type="button" class="btn btn-sm btn-pf-accent" onclick="addPartRow()"><i class="bi bi-plus-lg"></i> Add Part</button>
        </div>
        <div id="partRows"></div>
      </div>

      <div class="pf-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0" style="color:var(--pf-navy);">Labour / Service Charges</h6>
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addLabourRow()"><i class="bi bi-plus-lg"></i> Add Charge</button>
        </div>
        <div id="labourRows"></div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="pf-card">
        <h6 class="fw-bold mb-3" style="color:var(--pf-navy);">Payment</h6>
        <label class="form-label small fw-semibold">Discount (Rs.)</label>
        <input type="number" step="0.01" name="discount" class="form-control mb-3" value="0">

        <label class="form-label small fw-semibold">Payment Method</label>
        <select name="payment_method" class="form-select mb-3" id="paymentMethod" onchange="toggleAmountPaid()">
          <option value="cash">Cash</option>
          <option value="card">Card</option>
          <option value="upi">UPI</option>
          <option value="bank_transfer">Bank Transfer</option>
          <option value="credit">Credit (Due)</option>
        </select>

        <div id="amountPaidWrap">
          <label class="form-label small fw-semibold">Amount Paid (Rs.)</label>
          <input type="number" step="0.01" name="amount_paid" id="amountPaid" class="form-control mb-3" placeholder="Leave blank for full amount">
        </div>

        <button type="submit" class="btn btn-pf-primary w-100 btn-lg">Generate Invoice</button>
      </div>
    </div>
  </div>
</form>

<template id="partRowTemplate">
  <div class="row g-2 align-items-end mb-2 part-row">
    <div class="col-6">
      <select name="part_id[]" class="form-select form-select-sm part-select" required>
        <option value="">Select part...</option>
        {% for p in parts %}
          <option value="{{ p.id }}" data-price="{{ p.selling_price }}" data-stock="{{ p.current_stock }}">
            {{ p.name }} ({{ p.current_stock }} in stock) — Rs. {{ "%.2f"|format(p.selling_price) }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-3">
      <input type="number" name="quantity[]" class="form-control form-control-sm" placeholder="Qty" min="1" required>
    </div>
    <div class="col-2 text-muted small pf-line-total">Rs. 0.00</div>
    <div class="col-1">
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.part-row').remove()"><i class="bi bi-trash"></i></button>
    </div>
  </div>
</template>

<template id="labourRowTemplate">
  <div class="row g-2 align-items-end mb-2 labour-row">
    <div class="col-7">
      <select name="labour_name[]" class="form-select form-select-sm" onchange="fillLabourPrice(this)">
        <option value="">Select or type custom...</option>
        {% for lc in labour_options %}
          <option value="{{ lc.name }}" data-price="{{ lc.price }}">{{ lc.name }} — Rs. {{ "%.2f"|format(lc.price) }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-4">
      <input type="number" step="0.01" name="labour_price[]" class="form-control form-control-sm" placeholder="Amount">
    </div>
    <div class="col-1">
      <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.labour-row').remove()"><i class="bi bi-trash"></i></button>
    </div>
  </div>
</template>
{% endblock %}

{% block scripts %}
<script>
function addPartRow() {
  const tpl = document.getElementById('partRowTemplate');
  document.getElementById('partRows').appendChild(tpl.content.cloneNode(true));
}
function addLabourRow() {
  const tpl = document.getElementById('labourRowTemplate');
  document.getElementById('labourRows').appendChild(tpl.content.cloneNode(true));
}
function fillLabourPrice(sel) {
  const price = sel.options[sel.selectedIndex].getAttribute('data-price');
  const row = sel.closest('.labour-row');
  if (price) row.querySelector('input[name="labour_price[]"]').value = price;
}
function toggleAmountPaid() {
  const method = document.getElementById('paymentMethod').value;
  document.getElementById('amountPaidWrap').style.display = method === 'credit' ? 'none' : 'block';
}
document.addEventListener('change', function(e) {
  if (e.target.classList.contains('part-select')) {
    const row = e.target.closest('.part-row');
    const price = parseFloat(e.target.options[e.target.selectedIndex].getAttribute('data-price') || 0);
    const qtyInput = row.querySelector('input[name="quantity[]"]');
    const update = () => {
      const qty = parseInt(qtyInput.value || 0);
      row.querySelector('.pf-line-total').textContent = 'Rs. ' + (price * qty).toFixed(2);
    };
    qtyInput.oninput = update;
    update();
  }
});
addPartRow();
</script>
{% endblock %}
