{% extends "base.html" %}
{% block title %}{{ 'Edit' if part else 'Add' }} Part - PartFlow ERP{% endblock %}
{% block content %}
<div class="pf-topbar"><h1>{{ 'Edit' if part else 'Add' }} Part</h1></div>

<div class="pf-card" style="max-width: 900px;">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Part Name *</label>
        <input type="text" name="name" class="form-control" required value="{{ part.name if part else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">OEM Number</label>
        <input type="text" name="oem_number" class="form-control" value="{{ part.oem_number if part else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Alternate Part Number</label>
        <input type="text" name="alternate_part_number" class="form-control" value="{{ part.alternate_part_number if part else '' }}">
      </div>

      <div class="col-md-3">
        <label class="form-label small fw-semibold">Vehicle Type</label>
        <select name="vehicle_type" class="form-select">
          {% for vt in ['bike','car','truck','bus','tractor','jcb','heavy_vehicle'] %}
            <option value="{{ vt }}" {{ 'selected' if part and part.vehicle_type == vt }}>{{ vt.replace('_',' ').title() }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Vehicle Model</label>
        <input type="text" name="vehicle_model" class="form-control" value="{{ part.vehicle_model if part else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Brand</label>
        <input type="text" name="brand" class="form-control" value="{{ part.brand if part else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Category</label>
        <input type="text" name="category" class="form-control" value="{{ part.category if part else '' }}">
      </div>

      <div class="col-md-3">
        <label class="form-label small fw-semibold">Purchase Price (Rs.)</label>
        <input type="number" step="0.01" name="purchase_price" class="form-control" value="{{ part.purchase_price if part else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Selling Price (Rs.) *</label>
        <input type="number" step="0.01" name="selling_price" class="form-control" required value="{{ part.selling_price if part else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">GST %</label>
        <input type="number" step="0.01" name="gst_percent" class="form-control" value="{{ part.gst_percent if part else 18 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">HSN Code</label>
        <input type="text" name="hsn_code" class="form-control" value="{{ part.hsn_code if part else '' }}">
      </div>

      {% if not part %}
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Opening Stock</label>
        <input type="number" name="opening_stock" class="form-control" value="0">
      </div>
      {% endif %}
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Minimum Stock Level *</label>
        <input type="number" name="minimum_stock" class="form-control" required value="{{ part.minimum_stock if part else 5 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Rack Location</label>
        <input type="text" name="rack_location" class="form-control" value="{{ part.rack_location if part else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Supplier</label>
        <select name="supplier_id" class="form-select">
          <option value="">-- None --</option>
          {% for s in suppliers %}
            <option value="{{ s.id }}" {{ 'selected' if part and part.supplier_id == s.id }}>{{ s.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-pf-primary">{{ 'Save Changes' if part else 'Add Part' }}</button>
      <a href="{{ url_for('owner.inventory') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
