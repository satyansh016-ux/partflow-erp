<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PartFlow ERP</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>
<body>
<div class="pf-login-wrap">
  <div class="pf-login-card">
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo.svg') }}" width="56" height="56" alt="PartFlow ERP">
      <h4 class="mt-3 mb-0" style="color:var(--pf-navy); font-weight:800;">PartFlow ERP</h4>
      <p class="text-muted small mb-0">Spare Parts Business Management</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email</label>
        <input type="email" name="email" class="form-control form-control-lg" required autofocus placeholder="you@shop.com">
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-pf-primary btn-lg w-100">Log In</button>
    </form>
  </div>
</div>
</body>
</html>
