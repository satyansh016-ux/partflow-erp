{% extends "base.html" %}
{% block title %}Customers - PartFlow ERP{% endblock %}
{% block content %}
<div class="pf-topbar"><h1>Customers</h1></div>
<div class="pf-card mb-3">
  <form class="row g-2" method="GET">
    <div class="col-md-10"><input type="text" name="q" value="{{ q }}" class="form-control" placeholder="Search name, mobile, vehicle number..."></div>
    <div class="col-md-2"><button class="btn btn-pf-primary w-100">Search</button></div>
  </form>
</div>
<div class="pf-card">
  <table class="table table-pf table-sm">
    <thead><tr><th>Name</th><th>Mobile</th><th>Vehicle</th></tr></thead>
    <tbody>
      {% for c in customers %}
      <tr><td>{{ c.name }}</td><td>{{ c.mobile or '-' }}</td><td>{{ c.vehicle_number or '-' }}</td></tr>
      {% else %}
      <tr><td colspan="3" class="text-center text-muted py-4">No customers found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
